<head>

    <!-- Css Styles Link -->
    <link rel="stylesheet" href="./styles/styles.css">

    <!-- Google Font Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Google Font Merriweather -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"

<body>
    <header>
        <div class="hero-parent container">
            <div class="hero-content">
                <h3>Happy New Year</h3>
                <h1>New Year Party Celebration</h1>
            </div>
        </div>
    </header>

    <main>
        <!-- 65% Off Section -->
        <section>
            <div class="off-discount-parent">

                <div class="off-discount-contents">
                    <h1 class="off-discount-title">65% OFF</h1>
                    <p class="off-discount-des">OUR HOLIDAY DEALS ARE BETTER</p>
                    <h3 class="off-discount-subtitle">ALL CATEGORIES</h3>
                </div>

                <div class="off-discount-img">
                    <img src="./images/New Year Photo.png" alt="">
                </div>

            </div>
        </section>

        <!-- Mid Night Part Section-->
        <section class="midnight-part-section-container container ">
            <div class="midnight-section-parent">
                <div class="midnight-section-contents-parent">
                    <h1 class="midnight-section-title">Welcome  to <br>  midnight party</h1>
                    <p class="midnight-section-subtitle">Join us for an exciting midnight celebration filled with live entertainment, delicious <br> food, and
                        a spectacular countdown.</p>
                    <P class="midnight-party-btn">JOIN NOW</P>
                </div>
            </div>
            <div class="year-img">
                <img src="./images/group70.png" alt="">
            </div>
        </section>

    </main>

    <footer>

    </footer>
